<!DOCTYPE html>
<html>

<style>

.thumb {
  width: 200px;
  margin: 15px;
  border: 2px solid fuchsia;
  cursor: pointer;
}

.popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);

  justify-content: center;
  align-items: center;
}

.popup-content {
  background: black;
  border: 3px solid fuchsia;
  padding: 20px;
  text-align: center;
}

.popup-content img {
  max-width: 500px;
  max-height: 70vh;
}

#popup-date {
  color: lightblue;
  margin-top: 15px;
}

button {
  margin-top: 15px;
  padding: 10px;
  background: black;
  color: white;
  border: 2px solid fuchsia;
  font-family: 'Press Start 2P', cursive;
  cursor: pointer;
}
</style>

<div class="gallery">

  <img src="04-10-2022.jpg"
       class="thumb"
       onclick="openPopup('04-10-2022.jpg','4 octobre 2022')">

  <img src="17-01-2023.jpg"
       class="thumb"
       onclick="openPopup('17-01-2023.jpg','17 janvier 2023')">

  <img src="18-01-2023.jpg"
       class="thumb"
       onclick="openPopup('18-01-2023.jpg','18 janvier 2023')">

  <img src="12-11-2023.jpg"
       class="thumb"
       onclick="openPopup('12-11-2023.jpg','12 novembre 2023')">

   <img src="09-03-2024.jpg"
       class="thumb"
       onclick="openPopup('09-03-2024.jpg','9 mars 2024')">

   <img src="21-02-2025.jpg"
       class="thumb"
       onclick="openPopup('21-02-2025.jpg','21 février 2025')">

   <img src="usdoublephoto.jpg"
       class="thumb"
       onclick="openPopup('usdoublephoto.jpg','25 mai 2026')">

   <img src="31-05-2026.jpg"
       class="thumb"
       onclick="openPopup('31-05-2026.jpg','31 mai 2026')">




</div>

<div id="popup" class="popup" onclick="closePopup()">

  <div class="popup-content" onclick="event.stopPropagation()">

    <img id="popup-img" src="">
    <p id="popup-date"></p>

    <button onclick="closePopup()">FERMER</button>

  </div>

</div>


<script>

function openPopup(photo, date) {

  document.getElementById("popup-img").src = photo;
  document.getElementById("popup-date").innerHTML = date;

  document.getElementById("popup").style.display = "flex";
}

function closePopup() {

  document.getElementById("popup").style.display = "none";
}

</script>

</html>
