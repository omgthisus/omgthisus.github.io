<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>is this us???</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/three.js/build/ar-nft.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar-nft.js"></script>
  <script>
AFRAME.registerComponent('markerhandler', {
  init: function () {
    const el = this.el;

    el.addEventListener('markerFound', () => {
      // SON
      const audio = new Audio('Jingle.m4a');
      audio.play();

      // REDIRECTION après 2 sec
      setTimeout(() => {
        window.location.href = "./uuus.html";
      }, 2000);
    });
  }
});
</script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
  vr-mode-ui="false"
  renderer="logarithmicDepthBuffer: true;"
  embedded
  arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: true;"
>

  <!-- TON INVADER -->
  <a-nft
    type="nft"
    url="marker/invader"
    smooth="true"
    markerhandler
  >
    <a-box position="0 0 0" scale="3 3 3" color="blue"></a-box>
  </a-nft>

  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
