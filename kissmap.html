<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kissmap!!!3</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        html, body {
            margin: 0;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script id="kml-data" type="application/xml">
<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2" xmlns:gx="http://www.google.com/kml/ext/2.2" xmlns:kml="http://www.opengis.net/kml/2.2" xmlns:atom="http://www.w3.org/2005/Atom">
<Document id="1ODj78AokPje79rhmwd30M4KSlK8hQbzW">
    <name>Kissmap</name>
    <Folder id="14f1ae6b_0">
        <name>Calque sans titre</name>
        <open>1</open>
        <Placemark id="14f1ae6b_5D1D85DE29B99155">
            <name>25 Rue Jussieu</name>
            <Point>
                <coordinates>2.3540259,48.846657,0</coordinates>
            </Point>
        </Placemark>
        <Placemark id="14f1ae6b_5D1D866F8BCB6805">
            <name>Fondue 9</name>
            <Point>
                <coordinates>2.3622106,48.82400980000001,0</coordinates>
            </Point>
        </Placemark>
        <Placemark id="14f1ae6b_5D1D870A2908A61E">
            <name>Brigade de Sapeurs-Pompiers de Paris - Caserne Masséna</name>
            <Point>
                <coordinates>2.3748997,48.8226533,0</coordinates>
            </Point>
        </Placemark>
    </Folder>
</Document>
</kml>
</script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/togeojson@0.16.0"></script>

<script>
// 1. Créer la carte
const map = L.map('map').setView([48.8566, 2.3522], 12);

// 2. Ajouter le fond de carte OpenStreetMap
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// 3. Définir une icône personnalisée (ici, l'icône orange du KML)
const customIcon = L.icon({
    iconUrl: 'https://earth.google.com/earth/document/icon?color=e65100&id=1899&scale=4',
    iconSize: [32, 32], // Taille de l'icône
    iconAnchor: [16, 32], // Point d'ancrage (centre en bas)
    popupAnchor: [0, -32] // Position de la popup par rapport à l'icône
});

// 4. Lire et parser le KML
const kmlText = document.getElementById("kml-data").textContent;
const parser = new DOMParser();
const xml = parser.parseFromString(kmlText, "application/xml");

// 5. Convertir le KML en GeoJSON
const geojson = toGeoJSON.kml(xml);

// 6. Ajouter les marqueurs à la carte avec l'icône personnalisée
L.geoJSON(geojson, {
    pointToLayer: function (feature, latlng) {
        return L.marker(latlng, { icon: customIcon })
            .bindPopup(`<b>${feature.properties.name}</b>`);
    }
}).addTo(map);

// 7. Zoomer sur les données
map.fitBounds(L.geoJSON(geojson).getBounds());
</script>

</body>
</html>
